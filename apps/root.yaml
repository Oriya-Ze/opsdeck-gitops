apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsdeck-gitops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Oriya-Ze/opsdeck-gitops.git
    targetRevision: main
    path: apps
    directory:
      exclude: "root.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
